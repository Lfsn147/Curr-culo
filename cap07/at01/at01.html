<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Felipe | Dev Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .cartao {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .cartao::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: 0.5s;
        }

        .cartao:hover::before {
            left: 100%;
        }

        .cartao:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0, 255, 204, 0.15);
            border-color: rgba(0, 255, 204, 0.4);
        }

        .cartao-nome {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffffff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .cartao-divisor {
            height: 2px;
            border: none;
            background: linear-gradient(90deg, transparent, #00ffcc, transparent);
            margin: 1.5rem 0;
            width: 100%;
        }

        .cartao-cargo {
            font-size: 1.05rem;
            color: #b0bec5;
            font-weight: 400;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
        }

        .cartao-email {
            display: inline-block;
            font-size: 0.9rem;
            color: #00ffcc;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 50px;
            background: rgba(0, 255, 204, 0.03);
            transition: all 0.3s ease;
        }

        .cartao-email:hover {
            background: #00ffcc;
            color: #0f2027;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <main>
        <article class="cartao">
            <h1 class="cartao-nome">Lucas Felipe</h1>
            <hr class="cartao-divisor" />
            <p class="cartao-cargo">Estudante de Sistemas de Informação &bull; <strong>IFAL</strong></p>
            <a href="mailto:lfsn10@aluno.ifal.edu.br" class="cartao-email">lfsn10@aluno.ifal.edu.br</a>
        </article>
    </main>

</body>
</html>
